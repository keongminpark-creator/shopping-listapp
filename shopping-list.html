<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <link rel="icon" href="data:,">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #5a67d8; }

    #list { list-style: none; }

    #list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid #f0f4f8;
      transition: opacity 0.2s;
    }

    #list li:last-child { border-bottom: none; }

    #list li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    #list li span {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: color 0.2s, text-decoration 0.2s;
    }

    #list li.checked span {
      text-decoration: line-through;
      color: #a0aec0;
    }

    #list li .del-btn {
      background: none;
      border: none;
      color: #fc8181;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    #list li .del-btn:hover { background: #fff5f5; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>
    <ul id="list"></ul>
    <p class="empty" id="empty">아직 아이템이 없습니다.</p>
  </div>

  <script>
    const input = document.getElementById('itemInput');
    const list  = document.getElementById('list');
    const empty = document.getElementById('empty');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    function addItem() {
      const text = input.value.trim();
      if (!text) return;

      const li = document.createElement('li');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.addEventListener('change', () => li.classList.toggle('checked', cb.checked));

      const span = document.createElement('span');
      span.textContent = text;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.addEventListener('click', () => { li.remove(); syncEmpty(); });

      li.append(cb, span, del);
      list.appendChild(li);

      input.value = '';
      input.focus();
      syncEmpty();
    }

    function syncEmpty() {
      empty.style.display = list.children.length === 0 ? 'block' : 'none';
    }
  </script>
</body>
</html>
